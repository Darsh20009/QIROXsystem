<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QIROX Studio — غير متصل</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111111;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
      padding: 40px;
      -webkit-app-region: drag;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    h1 { font-size: 22px; font-weight: 700; color: #ffffff; }
    p  { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.6; max-width: 340px; }
    button {
      -webkit-app-region: no-drag;
      margin-top: 8px;
      padding: 10px 28px;
      background: #6d28d9;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #7c3aed; }
  </style>
</head>
<body>
  <img src="./icons/icon.png" class="logo" alt="QIROX" onerror="this.style.display='none'" />
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>تأكد من اتصالك بالإنترنت ثم أعد المحاولة. تطبيق QIROX Studio يحتاج اتصالاً نشطاً للعمل.</p>
  <button onclick="location.reload()">إعادة المحاولة</button>
</body>
</html>
