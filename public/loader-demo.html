<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QIROX Loader Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; }

  .glow1 { position: absolute; width: 320px; height: 320px; border-radius: 50%; background: radial-gradient(circle, rgba(139,92,246,0.07) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
  .glow2 { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(96,165,250,0.05) 0%, transparent 70%); top: calc(50% + 16px); left: calc(50% + 32px); transform: translate(-50%, -50%); pointer-events: none; }

  .wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 32px; }

  .orbit-ring { position: relative; width: 112px; height: 112px; display: flex; align-items: center; justify-content: center; }

  .ring-dashed {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px dashed rgba(139,92,246,0.28);
    animation: spin-cw 12s linear infinite;
  }
  .ring-outer {
    position: absolute; inset: 6px; border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: rgb(139,92,246);
    border-right-color: rgba(139,92,246,0.35);
    animation: spin-cw 1.4s cubic-bezier(0.5,0,0.5,1) infinite;
  }
  .ring-inner {
    position: absolute; inset: 14px; border-radius: 50%;
    border: 2px solid transparent;
    border-bottom-color: rgb(96,165,250);
    border-left-color: rgba(96,165,250,0.35);
    animation: spin-ccw 1.9s cubic-bezier(0.5,0,0.5,1) infinite;
  }
  .orbit-dot-track {
    position: absolute; inset: 6px; border-radius: 50%;
    animation: spin-cw 1.4s cubic-bezier(0.5,0,0.5,1) infinite;
  }
  .orbit-dot {
    position: absolute; top: -3px; left: 50%; transform: translateX(-50%);
    width: 6px; height: 6px; border-radius: 50%;
    background: rgb(139,92,246);
    box-shadow: 0 0 6px rgba(139,92,246,0.6);
  }

  .logo-center {
    width: 56px; height: 56px; border-radius: 18px;
    background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 50%, #2563eb 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 16px 40px -8px rgba(139,92,246,0.4), 0 4px 16px rgba(139,92,246,0.2);
    animation: logo-pulse 2.4s ease-in-out infinite;
  }
  .logo-center span {
    color: #fff; font-size: 24px; font-weight: 900; line-height: 1;
    letter-spacing: -0.02em; user-select: none;
  }

  .brand-row { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .brand-label {
    font-size: 9px; font-weight: 800; letter-spacing: 0.45em;
    text-transform: uppercase; color: rgba(0,0,0,0.2); user-select: none;
  }
  .dots { display: flex; gap: 7px; align-items: center; }
  .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(139,92,246,0.5);
    animation: bounce-dot 1.3s ease-in-out infinite;
  }
  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.16s; }
  .dot:nth-child(3) { animation-delay: 0.32s; }
  .dot:nth-child(4) { animation-delay: 0.48s; }

  @keyframes spin-cw   { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
  @keyframes spin-ccw  { from { transform: rotate(0deg); }   to { transform: rotate(-360deg); } }
  @keyframes logo-pulse {
    0%,100% { transform: scale(1); box-shadow: 0 16px 40px -8px rgba(139,92,246,0.4), 0 4px 16px rgba(139,92,246,0.2); }
    50% { transform: scale(1.04); box-shadow: 0 20px 48px -8px rgba(139,92,246,0.5), 0 6px 20px rgba(139,92,246,0.25); }
  }
  @keyframes bounce-dot {
    0%,100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  .label { position: absolute; bottom: 24px; font-size: 10px; color: rgba(0,0,0,0.2); letter-spacing: 0.1em; }
</style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>

  <div class="wrapper">
    <div class="orbit-ring">
      <div class="ring-dashed"></div>
      <div class="ring-outer"></div>
      <div class="ring-inner"></div>
      <div class="orbit-dot-track">
        <div class="orbit-dot"></div>
      </div>
      <div class="logo-center">
        <span>Q</span>
      </div>
    </div>

    <div class="brand-row">
      <span class="brand-label">QIROX</span>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <p class="label">Loading Screen Preview</p>
</body>
</html>
