    <style>
      html {
        background: #fff;
        overflow-x: hidden;
        max-width: 100%;
        /* Safari iOS: allow html to use fill-available so 100vh works correctly */
        height: -webkit-fill-available;
        -webkit-text-size-adjust: 100%;

      body {

        max-width: 100vw;
        width: 100%;
        /* Safari iOS: min-height fix so content is never clipped by address bar */
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      #root {

        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
      }
    </style>
    <script>
      (function() {
        try {
          var t = localStorage.getItem('qirox-theme');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
    <script>
      (function() {
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1;
        document.addEventListener('contextmenu', function(e) { if (!isMobile) e.preventDefault(); });
        if (!isMobile) {
          document.addEventListener('keydown', function(e) {
            if (
              e.key === 'F12' ||
              (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key.toUpperCase())) ||
              (e.ctrlKey && e.key.toUpperCase() === 'U') ||
              (e.metaKey && e.altKey && ['I','J','C'].includes(e.key.toUpperCase()))
            ) {
              e.preventDefault();
              e.stopPropagation();
              return false;
            }
          }, true);
          var devtoolsOpen = false;
          var threshold = 200;
          function checkDevTools() {
            var widthDiff = window.outerWidth - window.innerWidth;
            var heightDiff = window.outerHeight - window.innerHeight;
            var isOpen = widthDiff > threshold || heightDiff > threshold;
            if (isOpen && !devtoolsOpen) {
              devtoolsOpen = true;
              document.body.innerHTML = '';
              document.body.style.background = '#000';
            } else if (!isOpen && devtoolsOpen) {
              devtoolsOpen = false;
              location.reload();
            }
          }
          setInterval(checkDevTools, 1000);
        }
      })();
    </script>
